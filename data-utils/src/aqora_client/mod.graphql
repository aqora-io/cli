mutation CreateDatasetVersionFileMutation(
  $datasetVersionId: ID!
  $fileName: String!
) {
  createDatasetVersionFile(
    datasetVersionId: $datasetVersionId
    fileName: $fileName
  )
}

mutation UploadDatasetVersionFilePartMutation(
  $datasetVersionFileId: ID!
  $part: Int!
  $partSize: Int!
) {
  uploadDatasetVersionFilePart(
    datasetVersionFileId: $datasetVersionFileId
    part: $part
    partSize: $partSize
  )
}

mutation CompleteDatasetVersionFileMutation(
  $datasetVersionFileId: ID!
  $eTags: [String!]!
) {
  completeDatasetVersionFile(
    datasetVersionFileId: $datasetVersionFileId
    eTags: $eTags
  ) {
    id
  }
}
