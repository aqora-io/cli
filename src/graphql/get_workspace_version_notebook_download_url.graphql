query GetWorkspaceVersionNotebookDownloadUrl($owner: String!, $slug: String!, $version: Semver!) {
  workspaceBySlug(owner: $owner, slug: $slug) {
    version(version: $version) {
      libNotebook
      entries {
        __typename
        ... on WorkspaceFile {
          name
          downloadUrl
        }
      }
    }
  }
}
